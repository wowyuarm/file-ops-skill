name: Skill Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v1
      with:
        version: "latest"
    - name: Install dependencies
      run: |
        # Install project dependencies for test runner
        uv sync
        # Install skill-local venv for the script under test
        bash skills/file-ops/scripts/setup.sh
        echo "Installed packages:"
        uv pip list
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        uv run --with flake8 flake8 skills tests --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        uv run --with flake8 flake8 skills tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Run tests
      run: |
        uv run python -m unittest tests.test_file_ops
